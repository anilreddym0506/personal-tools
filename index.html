<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .main-container {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .password-item {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .password-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .password-field {
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        .expandable-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .expandable-row:hover {
            background-color: #f8f9fa;
        }
        
        .expandable-row.expanded {
            background-color: #e7f3ff;
        }
        
        .details-row {
            display: none;
            background-color: #f8f9fa;
        }
        
        .details-row.show {
            display: table-row;
        }
        
        .details-content {
            padding: 20px;
            border-left: 3px solid #667eea;
        }
        
        .detail-item {
            margin-bottom: 10px;
        }
        
        .detail-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
            display: inline-block;
            min-width: 120px;
        }
        
        .table tbody tr.expandable-row td {
            vertical-align: middle;
            padding: 12px;
        }
        
        .expand-icon {
            transition: transform 0.3s;
            display: inline-block;
            margin-right: 5px;
        }
        
        .expand-icon.rotated {
            transform: rotate(90deg);
        }
        
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .btn-copy {
            padding: 5px 10px;
            font-size: 0.9em;
        }
        
        .hidden {
            display: none;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 2em;
            color: #667eea;
        }
        
        .field-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .nav-tabs .nav-link.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .nav-tabs .nav-link {
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock logo"></i>
                <h2 class="mt-3">Password Manager</h2>
                <p class="text-muted">Enter your master password</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="masterPassword" class="form-label">Master Password</label>
                    <input type="password" class="form-control" id="masterPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Unlock</button>
                <div id="loginError" class="alert alert-danger mt-3 hidden"></div>
            </form>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="main-container">
        <div class="header">
            <div>
                <h3 class="mb-0"><i class="bi bi-shield-lock"></i> Password Manager</h3>
            </div>
            <button class="btn btn-danger" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Lock
            </button>
        </div>

        <div class="content-card">
            <!-- Navigation Tabs -->
            <ul class="nav nav-tabs mb-4" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="add-tab" data-bs-toggle="tab" data-bs-target="#addPanel" type="button">
                        <i class="bi bi-plus-circle"></i> Add Entry
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="view-tab" data-bs-toggle="tab" data-bs-target="#viewPanel" type="button">
                        <i class="bi bi-list-ul"></i> View All
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Add/Edit Panel -->
                <div class="tab-pane fade show active" id="addPanel">
                    <form id="passwordForm">
                        <input type="hidden" id="editId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="website" class="form-label">Website/Service Name *</label>
                                <input type="text" class="form-control" id="website" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="url" class="form-label">URL</label>
                                <input type="url" class="form-control" id="url" placeholder="https://example.com">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username/Email *</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">Password *</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                    <button class="btn btn-outline-primary" type="button" id="generatePassword">
                                        <i class="bi bi-arrow-repeat"></i> Generate
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category</label>
                                <input type="text" class="form-control" id="category" placeholder="e.g., Social, Banking, Email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="expiryDate" class="form-label">Password Expiry Date</label>
                                <input type="date" class="form-control" id="expiryDate">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" rows="3"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" id="saveBtn">
                                <i class="bi bi-save"></i> Save Entry
                            </button>
                            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display: none;">
                                <i class="bi bi-x-circle"></i> Cancel
                            </button>
                        </div>
                    </form>
                </div>

                <!-- View Panel -->
                <div class="tab-pane fade" id="viewPanel">
                    <div class="search-box">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search by website, username, or category...">
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover" id="passwordTable" style="display: none;">
                            <thead class="table-light">
                                <tr>
                                    <th>Website/Service</th>
                                    <th>Username</th>
                                    <th>Password</th>
                                    <th width="120">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="passwordList"></tbody>
                        </table>
                    </div>
                    
                    <div id="emptyState" class="text-center text-muted py-5" style="display: none;">
                        <i class="bi bi-inbox" style="font-size: 3em;"></i>
                        <p class="mt-3">No passwords saved yet. Add your first entry!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Encryption utilities using Web Crypto API
        class CryptoManager {
            constructor() {
                this.encoder = new TextEncoder();
                this.decoder = new TextDecoder();
            }

            async deriveKey(password, salt) {
                const keyMaterial = await crypto.subtle.importKey(
                    'raw',
                    this.encoder.encode(password),
                    'PBKDF2',
                    false,
                    ['deriveBits', 'deriveKey']
                );

                return crypto.subtle.deriveKey(
                    {
                        name: 'PBKDF2',
                        salt: salt,
                        iterations: 100000,
                        hash: 'SHA-256'
                    },
                    keyMaterial,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
            }

            async encrypt(data, password) {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await this.deriveKey(password, salt);

                const encryptedData = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    this.encoder.encode(JSON.stringify(data))
                );

                return {
                    salt: Array.from(salt),
                    iv: Array.from(iv),
                    data: Array.from(new Uint8Array(encryptedData))
                };
            }

            async decrypt(encryptedObj, password) {
                try {
                    const salt = new Uint8Array(encryptedObj.salt);
                    const iv = new Uint8Array(encryptedObj.iv);
                    const data = new Uint8Array(encryptedObj.data);
                    
                    const key = await this.deriveKey(password, salt);

                    const decryptedData = await crypto.subtle.decrypt(
                        { name: 'AES-GCM', iv: iv },
                        key,
                        data
                    );

                    return JSON.parse(this.decoder.decode(decryptedData));
                } catch (error) {
                    throw new Error('Decryption failed - incorrect password');
                }
            }
        }

        // Password Manager Application
        class PasswordManager {
            constructor() {
                this.crypto = new CryptoManager();
                this.masterPassword = null;
                this.passwords = [];
                this.editingId = null;
                this.init();
            }

            init() {
                // Login form
                document.getElementById('loginForm').addEventListener('submit', (e) => this.handleLogin(e));
                
                // Password form
                document.getElementById('passwordForm').addEventListener('submit', (e) => this.handleSave(e));
                document.getElementById('togglePassword').addEventListener('click', () => this.togglePasswordVisibility());
                document.getElementById('generatePassword').addEventListener('click', () => this.generatePassword());
                document.getElementById('cancelEditBtn').addEventListener('click', () => this.cancelEdit());
                
                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => this.filterPasswords(e.target.value));
                
                // Logout
                document.getElementById('logoutBtn').addEventListener('click', () => this.logout());
                
                // Tab switch - refresh list when viewing
                document.getElementById('view-tab').addEventListener('click', () => this.renderPasswordList());
            }

            async handleLogin(e) {
                e.preventDefault();
                const password = document.getElementById('masterPassword').value;
                const errorDiv = document.getElementById('loginError');
                
                try {
                    await this.loadPasswords(password);
                    this.masterPassword = password;
                    
                    // Show main app
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    
                    // Clear login form
                    document.getElementById('masterPassword').value = '';
                    errorDiv.classList.add('hidden');
                } catch (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.classList.remove('hidden');
                }
            }

            async loadPasswords(password) {
                const encryptedData = localStorage.getItem('passwordManagerData');
                
                if (!encryptedData) {
                    // First time use
                    this.passwords = [];
                    return;
                }

                try {
                    const encrypted = JSON.parse(encryptedData);
                    this.passwords = await this.crypto.decrypt(encrypted, password);
                } catch (error) {
                    throw new Error('Invalid master password');
                }
            }

            async saveToStorage() {
                const encrypted = await this.crypto.encrypt(this.passwords, this.masterPassword);
                localStorage.setItem('passwordManagerData', JSON.stringify(encrypted));
            }

            async handleSave(e) {
                e.preventDefault();
                
                const entry = {
                    id: this.editingId || Date.now().toString(),
                    website: document.getElementById('website').value.trim(),
                    url: document.getElementById('url').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value,
                    category: document.getElementById('category').value.trim(),
                    expiryDate: document.getElementById('expiryDate').value,
                    notes: document.getElementById('notes').value.trim(),
                    createdAt: this.editingId ? this.passwords.find(p => p.id === this.editingId).createdAt : new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                if (this.editingId) {
                    // Update existing
                    const index = this.passwords.findIndex(p => p.id === this.editingId);
                    this.passwords[index] = entry;
                } else {
                    // Add new
                    this.passwords.push(entry);
                }

                await this.saveToStorage();
                this.resetForm();
                
                // Show success message
                this.showToast('Entry saved successfully!');
                
                // Switch to view tab
                const viewTab = new bootstrap.Tab(document.getElementById('view-tab'));
                viewTab.show();
                this.renderPasswordList();
            }

            resetForm() {
                document.getElementById('passwordForm').reset();
                document.getElementById('editId').value = '';
                this.editingId = null;
                document.getElementById('saveBtn').innerHTML = '<i class="bi bi-save"></i> Save Entry';
                document.getElementById('cancelEditBtn').style.display = 'none';
            }

            cancelEdit() {
                this.resetForm();
                const addTab = new bootstrap.Tab(document.getElementById('add-tab'));
                addTab.show();
            }

            editEntry(id) {
                const entry = this.passwords.find(p => p.id === id);
                if (!entry) return;

                this.editingId = id;
                document.getElementById('editId').value = id;
                document.getElementById('website').value = entry.website;
                document.getElementById('url').value = entry.url;
                document.getElementById('username').value = entry.username;
                document.getElementById('password').value = entry.password;
                document.getElementById('category').value = entry.category;
                document.getElementById('expiryDate').value = entry.expiryDate;
                document.getElementById('notes').value = entry.notes;
                
                document.getElementById('saveBtn').innerHTML = '<i class="bi bi-save"></i> Update Entry';
                document.getElementById('cancelEditBtn').style.display = 'inline-block';
                
                // Switch to add tab
                const addTab = new bootstrap.Tab(document.getElementById('add-tab'));
                addTab.show();
            }

            async deleteEntry(id) {
                if (!confirm('Are you sure you want to delete this entry?')) return;
                
                this.passwords = this.passwords.filter(p => p.id !== id);
                await this.saveToStorage();
                this.renderPasswordList();
                this.showToast('Entry deleted successfully!');
            }

            renderPasswordList(filteredPasswords = null) {
                const list = document.getElementById('passwordList');
                const table = document.getElementById('passwordTable');
                const emptyState = document.getElementById('emptyState');
                const passwords = filteredPasswords !== null ? filteredPasswords : this.passwords;

                if (passwords.length === 0) {
                    list.innerHTML = '';
                    table.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                table.style.display = 'table';
                
                list.innerHTML = passwords.map(entry => `
                    <tr class="expandable-row" onclick="app.toggleDetails('${entry.id}')">
                        <td>
                            <i class="bi bi-chevron-right expand-icon" id="icon-${entry.id}"></i>
                            <strong>${this.escapeHtml(entry.website)}</strong>
                            ${entry.category ? `<br><span class="category-badge bg-primary text-white">${this.escapeHtml(entry.category)}</span>` : ''}
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <span>${this.escapeHtml(entry.username)}</span>
                                <button class="btn btn-sm btn-outline-secondary btn-copy" onclick="event.stopPropagation(); app.copyToClipboard('${this.escapeHtml(entry.username)}', this)">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                            </div>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <span class="password-field" id="pwd-${entry.id}">••••••••</span>
                                <button class="btn btn-sm btn-outline-secondary" onclick="event.stopPropagation(); app.togglePasswordField('${entry.id}', '${this.escapeHtml(entry.password).replace(/'/g, "\\'")}')">
                                    <i class="bi bi-eye" id="eye-${entry.id}"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-secondary btn-copy" onclick="event.stopPropagation(); app.copyToClipboard('${this.escapeHtml(entry.password).replace(/'/g, "\\'")}', this)">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                            </div>
                        </td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); app.editEntry('${entry.id}')" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); app.deleteEntry('${entry.id}')" title="Delete">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr class="details-row" id="details-${entry.id}">
                        <td colspan="4">
                            <div class="details-content">
                                <div class="row">
                                    ${entry.url ? `
                                    <div class="col-md-6 detail-item">
                                        <span class="detail-label"><i class="bi bi-link-45deg"></i> URL:</span>
                                        <a href="${this.escapeHtml(entry.url)}" target="_blank" class="text-decoration-none" onclick="event.stopPropagation()">
                                            ${this.escapeHtml(entry.url)} <i class="bi bi-box-arrow-up-right"></i>
                                        </a>
                                    </div>
                                    ` : ''}
                                    
                                    ${entry.expiryDate ? `
                                    <div class="col-md-6 detail-item">
                                        <span class="detail-label"><i class="bi bi-calendar-event"></i> Expires On:</span>
                                        <span>${new Date(entry.expiryDate).toLocaleDateString()}</span>
                                    </div>
                                    ` : ''}
                                    
                                    <div class="col-md-6 detail-item">
                                        <span class="detail-label"><i class="bi bi-calendar-plus"></i> Created:</span>
                                        <span>${new Date(entry.createdAt).toLocaleDateString()} ${new Date(entry.createdAt).toLocaleTimeString()}</span>
                                    </div>
                                    
                                    <div class="col-md-6 detail-item">
                                        <span class="detail-label"><i class="bi bi-calendar-check"></i> Last Updated:</span>
                                        <span>${new Date(entry.updatedAt).toLocaleDateString()} ${new Date(entry.updatedAt).toLocaleTimeString()}</span>
                                    </div>
                                    
                                    ${entry.notes ? `
                                    <div class="col-md-12 detail-item">
                                        <span class="detail-label"><i class="bi bi-sticky"></i> Notes:</span>
                                        <div class="mt-2 p-2 bg-white rounded border">${this.escapeHtml(entry.notes)}</div>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            togglePasswordField(id, password) {
                const field = document.getElementById(`pwd-${id}`);
                const icon = document.getElementById(`eye-${id}`);
                if (field.textContent === '••••••••') {
                    field.textContent = password;
                    if (icon) icon.className = 'bi bi-eye-slash';
                } else {
                    field.textContent = '••••••••';
                    if (icon) icon.className = 'bi bi-eye';
                }
            }

            toggleDetails(id) {
                const detailsRow = document.getElementById(`details-${id}`);
                const expandIcon = document.getElementById(`icon-${id}`);
                const mainRow = expandIcon.closest('tr');
                
                if (detailsRow.classList.contains('show')) {
                    detailsRow.classList.remove('show');
                    expandIcon.classList.remove('rotated');
                    mainRow.classList.remove('expanded');
                } else {
                    detailsRow.classList.add('show');
                    expandIcon.classList.add('rotated');
                    mainRow.classList.add('expanded');
                }
            }

            filterPasswords(searchTerm) {
                const term = searchTerm.toLowerCase();
                const filtered = this.passwords.filter(entry => 
                    entry.website.toLowerCase().includes(term) ||
                    entry.username.toLowerCase().includes(term) ||
                    entry.category.toLowerCase().includes(term) ||
                    (entry.url && entry.url.toLowerCase().includes(term))
                );
                this.renderPasswordList(filtered);
            }

            togglePasswordVisibility() {
                const input = document.getElementById('password');
                const icon = document.querySelector('#togglePassword i');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'bi bi-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'bi bi-eye';
                }
            }

            generatePassword() {
                const length = 16;
                const charset = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
                let password = '';
                
                // Ensure at least one of each type
                password += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random() * 26)];
                password += 'abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random() * 26)];
                password += '0123456789'[Math.floor(Math.random() * 10)];
                password += '!@#$%^&*()_+-='[Math.floor(Math.random() * 14)];
                
                // Fill the rest
                for (let i = password.length; i < length; i++) {
                    password += charset[Math.floor(Math.random() * charset.length)];
                }
                
                // Shuffle
                password = password.split('').sort(() => Math.random() - 0.5).join('');
                
                document.getElementById('password').value = password;
                document.getElementById('password').type = 'text';
                document.querySelector('#togglePassword i').className = 'bi bi-eye-slash';
            }

            copyToClipboard(text, button) {
                navigator.clipboard.writeText(text).then(() => {
                    const originalHTML = button.innerHTML;
                    button.innerHTML = '<i class="bi bi-check"></i>';
                    button.classList.add('btn-success');
                    button.classList.remove('btn-outline-secondary');
                    
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                        button.classList.remove('btn-success');
                        button.classList.add('btn-outline-secondary');
                    }, 2000);
                });
            }

            showToast(message) {
                // Simple alert for now - can be enhanced with Bootstrap toast
                const toast = document.createElement('div');
                toast.className = 'position-fixed top-0 end-0 p-3';
                toast.style.zIndex = '9999';
                toast.innerHTML = `
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            logout() {
                this.masterPassword = null;
                this.passwords = [];
                this.resetForm();
                document.getElementById('searchInput').value = '';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        // Initialize app
        const app = new PasswordManager();
    </script>
</body>
</html>
